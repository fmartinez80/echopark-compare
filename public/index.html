<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EchoPark · Vehicle Comparison</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --ep-navy:    #0D1F36;
  --ep-navy2:   #132843;
  --ep-lime:    #96D600;
  --ep-lime-dk: #74A800;
  --ep-green:   #1A7A3C;
  --ep-green-lt:#E6F5EC;
  --ep-white:   #FFFFFF;
  --ep-surface: #F5F7F9;
  --ep-card:    #FFFFFF;
  --ep-border:  #E0E6ED;
  --ep-border2: #C8D5E0;
  --ep-text:    #0D1F36;
  --ep-text2:   #4A6070;
  --ep-muted:   #8FA3B1;
  --ep-red:     #D63B3B;
  --ep-red-lt:  #FDEAEA;
  --ep-orange:  #D95F1A;
  --ep-blue:    #1A6EC7;
  --ep-blue-lt: #EBF3FC;
  --radius-sm:  6px;
  --radius-md:  10px;
  --radius-lg:  16px;
  --radius-xl:  24px;
}
html, body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: #0D1F36;
  margin: 0; padding: 20px 0;
  min-height: 100vh;
  display: flex; align-items: flex-start; justify-content: center;
}
#phone {
  width: 390px; min-height: 844px; background: var(--ep-surface);
  border-radius: 38px; overflow: hidden; display: flex; flex-direction: column;
  box-shadow: 0 40px 100px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.08);
  position: relative;
}
@media (max-width: 430px) {
  html, body { padding: 0; background: var(--ep-surface); }
  #phone { width: 100%; border-radius: 0; min-height: 100vh; box-shadow: none; }
}
.screen { display: none; flex-direction: column; min-height: 844px; }
.screen.active { display: flex; }

/* NAV */
.ep-nav { background: var(--ep-navy); padding: 13px 16px 11px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.ep-logo-text { font-size: 11px; font-weight: 900; color: var(--ep-lime); letter-spacing: 1.8px; text-transform: uppercase; }
.ep-nav-sub { font-size: 10px; color: var(--ep-muted); font-weight: 600; }
.ep-back-btn { background: none; border: none; color: var(--ep-lime); font-size: 12px; font-weight: 800; cursor: pointer; display: flex; align-items: center; gap: 3px; padding: 0; letter-spacing: 0.3px; font-family: inherit; }

/* BROWSE HEADER - light */
.browse-nav { background: var(--ep-white); padding: 18px 16px 14px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--ep-border); flex-shrink: 0; }
.browse-nav-title { font-size: 22px; font-weight: 900; color: var(--ep-navy); letter-spacing: -0.3px; }
.browse-nav-count { font-size: 12px; color: var(--ep-text2); font-weight: 600; }
.filter-strip { background: var(--ep-white); padding: 10px 16px 12px; display: flex; gap: 7px; overflow-x: auto; flex-shrink: 0; border-bottom: 1px solid var(--ep-border); }
.filter-strip::-webkit-scrollbar { display: none; }
.fchip { background: transparent; border: 1.5px solid var(--ep-border2); border-radius: 99px; padding: 5px 13px; font-size: 11.5px; font-weight: 700; color: var(--ep-text2); white-space: nowrap; cursor: pointer; flex-shrink: 0; transition: all 0.15s; font-family: inherit; }
.fchip.on { background: var(--ep-navy); color: var(--ep-white); border-color: var(--ep-navy); }

/* COMPARE TRAY - always visible */
.compare-tray { position: sticky; bottom: 0; z-index: 30; background: var(--ep-white); border-top: 1px solid var(--ep-border); padding: 12px 16px 18px; box-shadow: 0 -4px 20px rgba(0,0,0,0.08); }
.tray-slots { display: flex; gap: 8px; margin-bottom: 10px; }
.tray-slot { flex: 1; min-height: 52px; border-radius: var(--radius-md); padding: 8px 10px; border: 1.5px dashed var(--ep-border2); background: var(--ep-surface); display: flex; align-items: center; gap: 8px; transition: all 0.2s; }
.tray-slot.filled { border-style: solid; border-color: var(--ep-navy); background: var(--ep-white); }
.slot-num { width: 20px; height: 20px; border-radius: 50%; background: var(--ep-surface); border: 1.5px solid var(--ep-border2); display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 900; color: var(--ep-muted); flex-shrink: 0; }
.slot-num.filled-num { background: var(--ep-navy); border-color: var(--ep-navy); color: var(--ep-white); }
.slot-info { flex: 1; min-width: 0; }
.slot-empty-txt { font-size: 10.5px; color: var(--ep-muted); font-weight: 600; }
.slot-car-name { font-size: 10.5px; font-weight: 800; color: var(--ep-navy); line-height: 1.25; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.slot-car-price { font-size: 12px; font-weight: 900; color: var(--ep-navy); margin-top: 1px; }
.tray-cta { width: 100%; padding: 14px; border-radius: 99px; background: var(--ep-navy); border: 2px solid var(--ep-lime); cursor: pointer; font-size: 12px; font-weight: 900; color: var(--ep-white); letter-spacing: 0.3px; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 8px; font-family: inherit; opacity: 0.35; pointer-events: none; transition: all 0.2s; }
.tray-cta.go { opacity: 1; pointer-events: all; }

/* VEHICLE LIST */
.vgrid { display: flex; flex-direction: column; gap: 0; padding: 0 0 160px; overflow-y: auto; flex: 1; background: var(--ep-white); }
.vcard { background: var(--ep-white); border-bottom: 1px solid var(--ep-border); overflow: hidden; transition: background 0.2s; cursor: pointer; position: relative; display: flex; flex-direction: column; }
.vcard.s1 { background: rgba(150,214,0,0.04); }
.vcard.s2 { background: rgba(56,189,248,0.04); }
.vcard-img-wrap { width: 100%; height: 180px; overflow: hidden; background: #F0F2F5; position: relative; }
.vcard-thumb { width: 100%; height: 100%; object-fit: cover; display: block; }
.vcard-thumb-ph { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 44px; background: linear-gradient(145deg,#e8ecf0,#d0d8e0); }
.vcard-body { padding: 12px 16px 0; }
.vcard-yr-mk { font-size: 10px; font-weight: 600; color: var(--ep-muted); }
.vcard-model { font-size: 17px; font-weight: 900; color: var(--ep-navy); line-height: 1.2; margin-top: 2px; }
.vcard-trim { font-size: 11px; color: var(--ep-text2); margin-top: 1px; }
.vcard-price { font-size: 22px; font-weight: 900; color: var(--ep-navy); margin-top: 6px; letter-spacing: -0.5px; }
.vcard-badges { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
.vbadge { font-size: 9px; font-weight: 800; padding: 3px 8px; border-radius: 99px; letter-spacing: 0.2px; }
.vb-deal { background: var(--ep-green-lt); color: var(--ep-green); }
.vb-hot  { background: #FEF0E6; color: var(--ep-orange); }
.vb-drop { background: var(--ep-blue-lt); color: var(--ep-blue); }
.vcard-actions { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
.vcard-schedule { font-size: 10px; font-weight: 700; color: var(--ep-white); background: var(--ep-green); border: none; border-radius: 99px; padding: 6px 12px; cursor: pointer; font-family: inherit; }
.vcard-heart { width: 28px; height: 28px; border-radius: 50%; border: 1.5px solid var(--ep-border2); background: var(--ep-white); display: flex; align-items: center; justify-content: center; font-size: 13px; cursor: pointer; margin-left: auto; }
.vcard-compare { padding: 10px 16px 12px; border-top: 1px solid var(--ep-border); margin-top: 10px; }
.compare-cb { display: flex; align-items: center; gap: 8px; cursor: pointer; }
.compare-box { width: 20px; height: 20px; border-radius: 4px; border: 2px solid var(--ep-border2); background: var(--ep-white); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 900; transition: all 0.15s; flex-shrink: 0; }
.compare-box.on1 { background: var(--ep-lime); border-color: var(--ep-lime); color: var(--ep-navy); }
.compare-box.on2 { background: #38BDF8; border-color: #38BDF8; color: var(--ep-navy); }
.compare-box.off { opacity: 0.4; }
.compare-lbl { font-size: 11px; font-weight: 700; color: var(--ep-text2); text-transform: uppercase; letter-spacing: 0.5px; }
.compare-lbl.on { color: var(--ep-navy); font-weight: 800; }
.vsel-dot { position: absolute; top: 10px; left: 10px; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 900; }
.vsel-dot.d1 { background: var(--ep-lime); color: var(--ep-navy); }
.vsel-dot.d2 { background: #38BDF8; color: var(--ep-navy); }

/* PRIORITIES */
.prio-hero { background: var(--ep-white); padding: 22px 18px 20px; flex-shrink: 0; border-bottom: 1px solid var(--ep-border); }
.prio-eyebrow { font-size: 11px; font-weight: 900; color: var(--ep-navy); letter-spacing: 0; text-transform: none; margin-bottom: 4px; }
.prio-title { font-size: 20px; font-weight: 900; color: var(--ep-navy); line-height: 1.2; }
.prio-vs { display: flex; align-items: flex-start; gap: 14px; margin-top: 18px; }
.prio-v { flex: 1; text-align: center; }
.prio-v-thumb { width: 100%; aspect-ratio: 4/3; object-fit: cover; border-radius: 8px; margin-bottom: 8px; display: block; }
.prio-v-thumb-ph { width: 100%; aspect-ratio: 4/3; border-radius: 8px; background: var(--ep-surface); display: flex; align-items: center; justify-content: center; font-size: 22px; margin-bottom: 8px; }
.prio-v-name { font-size: 11px; font-weight: 800; color: var(--ep-navy); line-height: 1.3; }
.prio-v-sub { font-size: 9.5px; color: var(--ep-muted); margin-top: 2px; }
.prio-v-price { font-size: 14px; font-weight: 900; color: var(--ep-navy); margin-top: 3px; }
.prio-vs-orb { display: none; }
.prio-body { flex: 1; overflow-y: auto; padding: 16px 16px 4px; background: var(--ep-white); }
.prio-section-lbl { display: none; }
.pcard { background: var(--ep-white); border-radius: 0; border: none; border-bottom: 1px solid var(--ep-border); padding: 16px 0; margin-bottom: 0; }
.pcard-top { display: flex; align-items: center; gap: 9px; margin-bottom: 10px; }
.pcard-icon { font-size: 0; width: 0; display: none; }
.pcard-name { font-size: 14px; font-weight: 800; color: var(--ep-navy); flex: 1; text-transform: uppercase; letter-spacing: 0.3px; }
.pcard-chip { font-size: 9px; font-weight: 800; padding: 4px 10px; border-radius: 99px; background: var(--ep-green-lt); color: var(--ep-green); transition: all 0.2s; }
.pcard-chip.lit { background: var(--ep-green-lt); color: var(--ep-green); }
input[type=range].epslider { -webkit-appearance: none; appearance: none; width: 100%; height: 4px; border-radius: 99px; outline: none; cursor: pointer; display: block; }
input[type=range].epslider::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%; background: var(--ep-navy); border: 3px solid white; box-shadow: 0 2px 6px rgba(0,0,0,0.2); }
input[type=range].epslider::-moz-range-thumb { width: 20px; height: 20px; border-radius: 50%; background: var(--ep-navy); border: 3px solid white; }
.pslider-ends { display: none; }
.pslider-end { font-size: 9px; color: var(--ep-muted); font-weight: 600; }
.gen-btn-wrap { padding: 16px 16px 24px; flex-shrink: 0; background: var(--ep-white); }
.gen-btn { width: 100%; padding: 16px; border-radius: 99px; background: var(--ep-navy); border: 2px solid var(--ep-lime); cursor: pointer; font-size: 13px; font-weight: 900; color: var(--ep-white); letter-spacing: 0.5px; text-transform: uppercase; font-family: inherit; display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: none; }

/* COMPARISON */
.comp-header { background: var(--ep-white); padding: 14px 16px 14px; flex-shrink: 0; position: sticky; top: 0; z-index: 10; border-bottom: 1px solid var(--ep-border); }
.comp-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.comp-nav .ep-back-btn { color: var(--ep-navy); }
.comp-nav .ep-logo-text { color: var(--ep-navy); font-size: 14px; font-weight: 900; letter-spacing: 0; }
.comp-v-row { display: flex; align-items: flex-start; gap: 6px; }
.comp-vcard { flex: 1; border-radius: 0; overflow: hidden; border: none; background: var(--ep-white); text-align: center; }
.comp-vcard.winner { background: var(--ep-white); }
.comp-vcard-thumb { width: 100%; height: 80px; object-fit: cover; display: block; border-radius: 6px; }
.comp-vcard-thumb-ph { width: 100%; height: 80px; display: flex; align-items: center; justify-content: center; font-size: 16px; background: var(--ep-surface); border-radius: 6px; color: var(--ep-muted); }
.comp-vcard-body { padding: 8px 4px 4px; }
.comp-ai-badge { display: none; }
.comp-v-name { font-size: 11px; font-weight: 800; color: var(--ep-navy); line-height: 1.3; }
.comp-v-sub { font-size: 9px; color: var(--ep-muted); margin-top: 2px; }
.comp-v-price { font-size: 13px; font-weight: 900; color: var(--ep-navy); margin-top: 3px; }
.vs-pill { display: none; }

/* AI SUMMARY */
.ai-summary-wrap { background: var(--ep-white); flex-shrink: 0; border-bottom: 1px solid var(--ep-border); }
.ai-toggle-btn { width: 100%; display: flex; align-items: center; gap: 10px; padding: 14px 16px; background: none; border: none; cursor: pointer; text-align: left; font-family: inherit; }
.ai-toggle-accent { width: 3px; height: 18px; border-radius: 2px; background: var(--ep-green); flex-shrink: 0; }
.ai-toggle-label { font-size: 12px; font-weight: 900; color: var(--ep-navy); text-transform: uppercase; letter-spacing: 0.5px; flex: 1; }
.ai-toggle-chips { display: flex; gap: 4px; }
.ai-chip-mini { font-size: 9px; font-weight: 800; padding: 3px 9px; border-radius: 99px; background: var(--ep-green-lt); color: var(--ep-green); white-space: nowrap; }
.ai-chevron { font-size: 14px; color: var(--ep-muted); transition: transform 0.22s; flex-shrink: 0; }
.ai-chevron.open { transform: rotate(180deg); }
.ai-body { overflow: hidden; max-height: 0; transition: max-height 0.4s ease; }
.ai-body.open { max-height: 800px; }
.comp-sliders-wrap { padding: 8px 16px 14px; }
.cslider-row { padding: 6px 0; }
.cslider-lrow { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.cslider-icon { display: none; }
.cslider-name { font-size: 13px; font-weight: 800; color: var(--ep-navy); flex: 1; }
.cslider-val { font-size: 10px; font-weight: 700; color: var(--ep-green); min-width: 80px; text-align: right; }
.cslider-val.lit { color: var(--ep-green); }
.verdict-wrap { padding: 14px 16px 16px; border-top: 1px solid var(--ep-border); }
.verdict-card { border-radius: var(--radius-md); padding: 16px; border-left: 4px solid var(--ep-green); background: var(--ep-surface); border-top: 1px solid var(--ep-border); border-right: 1px solid var(--ep-border); border-bottom: 1px solid var(--ep-border); }
.verdict-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
.verdict-bar-lbl { font-size: 9px; font-weight: 800; color: var(--ep-text2); white-space: nowrap; }
.verdict-track { flex: 1; height: 6px; background: var(--ep-border); border-radius: 3px; overflow: hidden; display: flex; }
.vbar-l { height: 100%; transition: width 0.4s ease; }
.vbar-r { flex: 1; height: 100%; }
.verdict-ttl { font-size: 14px; font-weight: 900; color: var(--ep-navy); text-transform: none; letter-spacing: 0; margin-bottom: 8px; }
.verdict-lines p { font-size: 12px; line-height: 1.6; margin-bottom: 4px; color: var(--ep-text2); }
.verdict-lines p.bold { font-weight: 800; color: var(--ep-navy); font-size: 13px; }

/* SPEC ROWS */
.spec-scroll { flex: 1; overflow-y: auto; background: var(--ep-white); }
.sec-div { padding: 16px 16px 6px; display: flex; align-items: center; gap: 8px; }
.sec-div-lbl { font-size: 9px; font-weight: 900; color: var(--ep-muted); text-transform: uppercase; letter-spacing: 1.2px; white-space: nowrap; }
.sec-div-line { flex: 1; height: 1px; background: var(--ep-border); }
.srow { margin: 0 16px 1px; background: var(--ep-white); border-radius: 0; overflow: hidden; border: none; border-bottom: 1px solid var(--ep-border); }
.srow-hdr { background: transparent; padding: 8px 0 4px; border-bottom: none; text-align: left; font-size: 9px; font-weight: 800; color: var(--ep-muted); text-transform: uppercase; letter-spacing: 0.8px; }
.srow-cells { display: flex; }
.scell { flex: 1; padding: 6px 0 10px; display: flex; flex-direction: column; gap: 3px; border-left: 3px solid transparent; padding-left: 8px; }
.scell:first-child { border-right: 1px solid var(--ep-border); padding-right: 8px; }
.scell.win { border-left-color: var(--ep-green); }
.sval { font-size: 13px; font-weight: 700; color: var(--ep-navy); }
.sval.muted { font-weight: 400; color: var(--ep-muted); }
.spill { display: inline-flex; align-items: center; padding: 2px 7px; border-radius: 99px; font-size: 8px; font-weight: 800; }
.sp-green { background: var(--ep-green-lt); color: var(--ep-green); }
.sp-red   { background: var(--ep-red-lt);   color: var(--ep-red); }
.sp-blue  { background: var(--ep-blue-lt);  color: var(--ep-blue); }
.sp-neutral{ background: var(--ep-surface); color: var(--ep-text2); }
.mbar { width: 100%; height: 4px; border-radius: 99px; background: var(--ep-border); overflow: hidden; margin-top: 3px; }
.mbar-fill { height: 100%; border-radius: 99px; }
.chk { width: 17px; height: 17px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 9.5px; font-weight: 900; flex-shrink: 0; }
.chk-y { background: var(--ep-green-lt); color: var(--ep-green); }
.chk-n { background: var(--ep-red-lt);   color: var(--ep-red); }
.cta-wrap { padding: 20px 16px 8px; display: flex; flex-direction: column; gap: 10px; flex-shrink: 0; }
.cta-p { width:100%; padding:16px; border-radius:99px; background:#4A5568; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; font-family:inherit; box-shadow:none; }
.cta-p .t { font-size:12px; font-weight:800; color:var(--ep-white); letter-spacing:0.3px; text-transform:uppercase; }
.cta-s { width:100%; padding:14px; border-radius:99px; background:#4A5568; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; font-family:inherit; }
.cta-s .t { font-size:12px; font-weight:800; color:var(--ep-white); letter-spacing:0.3px; text-transform:uppercase; }
.cta-new { width:100%; padding:14px; border-radius:99px; background:var(--ep-lime); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; font-family:inherit; }
.cta-new .t { font-size:12px; font-weight:800; color:var(--ep-navy); letter-spacing:0.3px; text-transform:uppercase; }
.dismiss { padding:12px 24px 18px; text-align:center; font-size:10px; color:var(--ep-muted); }

/* CHAT */
.chat-hdr { background: var(--ep-navy); padding: 11px 14px; flex-shrink: 0; }
.chat-agent { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
.agent-av { width: 38px; height: 38px; border-radius: 50%; background: var(--ep-lime); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 900; color: var(--ep-navy); flex-shrink: 0; }
.agent-nm { font-size: 14px; font-weight: 800; color: var(--ep-white); }
.agent-st { font-size: 9.5px; color: var(--ep-lime); display: flex; align-items: center; gap: 4px; margin-top: 1px; }
.st-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--ep-lime); }
.chat-ctx { background: rgba(150,214,0,0.07); border: 1px solid rgba(150,214,0,0.2); border-radius: 8px; margin-top: 10px; padding: 7px 12px; display: flex; align-items: center; gap: 8px; }
.ctx-lbl { font-size: 9px; font-weight: 800; color: var(--ep-lime); text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; }
.ctx-cars { font-size: 10.5px; color: rgba(255,255,255,0.8); font-weight: 700; }
.chat-msgs { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 11px; background: var(--ep-surface); }
.cmsg { display: flex; flex-direction: column; max-width: 84%; }
.cmsg.user { align-self: flex-end; align-items: flex-end; }
.cmsg.agent { align-self: flex-start; }
.cmsg-bubble { padding: 10px 13px; border-radius: 16px; font-size: 13px; line-height: 1.5; font-weight: 500; }
.cmsg.user .cmsg-bubble { background: var(--ep-navy); color: white; border-bottom-right-radius: 3px; }
.cmsg.agent .cmsg-bubble { background: var(--ep-card); color: var(--ep-text); border: 1px solid var(--ep-border); border-bottom-left-radius: 3px; }
.cmsg-time { font-size: 9px; color: var(--ep-muted); margin-top: 2px; padding: 0 4px; font-weight: 600; }
.typing-wrap { display: flex; gap: 4px; padding: 12px 16px; background: var(--ep-card); border-radius: 16px; border-bottom-left-radius: 3px; border: 1px solid var(--ep-border); width: fit-content; }
.tdot { width: 7px; height: 7px; border-radius: 50%; background: var(--ep-muted); animation: tb 1.2s infinite; }
.tdot:nth-child(2) { animation-delay: .2s; }
.tdot:nth-child(3) { animation-delay: .4s; }
@keyframes tb { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }
.qr-strip { padding: 7px 14px; display: flex; gap: 7px; overflow-x: auto; flex-shrink: 0; background: var(--ep-surface); border-top: 1px solid var(--ep-border); }
.qr-strip::-webkit-scrollbar { display: none; }
.qrbtn { background: var(--ep-card); border: 1.5px solid var(--ep-border); border-radius: 99px; padding: 6px 13px; font-size: 11.5px; font-weight: 700; color: var(--ep-navy); white-space: nowrap; cursor: pointer; font-family: inherit; flex-shrink: 0; }
.chat-inp-row { padding: 9px 14px 14px; background: var(--ep-card); border-top: 1px solid var(--ep-border); display: flex; gap: 9px; align-items: flex-end; flex-shrink: 0; }
.chat-ta { flex: 1; border: 1.5px solid var(--ep-border); border-radius: 20px; padding: 9px 14px; font-size: 13px; outline: none; resize: none; max-height: 80px; font-family: inherit; color: var(--ep-text); background: var(--ep-surface); font-weight: 500; }
.chat-ta:focus { border-color: var(--ep-lime); }
.chat-send-btn { width: 38px; height: 38px; border-radius: 50%; background: var(--ep-lime); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
</style>
</head>
<body>
<div id="phone">

<!-- BROWSE -->
<div id="s-browse" class="screen active">
  <div class="browse-nav">
    <span class="browse-nav-title">Compare Vehicles</span>
    <span class="browse-nav-count" id="browse-count">8 vehicles</span>
  </div>
  <div class="filter-strip">
    <button class="fchip on" onclick="setF('All',this)">All</button>
    <button class="fchip" onclick="setF('SUV',this)">SUVs</button>
    <button class="fchip" onclick="setF('Sedan',this)">Sedans</button>
    <button class="fchip" onclick="setF('Truck',this)">Trucks</button>
    <button class="fchip" onclick="setF('Coupe',this)">Coupes</button>
  </div>
  <div class="vgrid" id="vgrid"></div>
  <div class="compare-tray" id="ctray">
    <div class="tray-slots">
      <div class="tray-slot" id="ts0"><div class="slot-num" id="tsn0">1</div><div class="slot-info" id="tsi0"><span class="slot-empty-txt">Select Vehicle 1</span></div></div>
      <div class="tray-slot" id="ts1"><div class="slot-num" id="tsn1">2</div><div class="slot-info" id="tsi1"><span class="slot-empty-txt">Select Vehicle 2</span></div></div>
    </div>
    <button class="tray-cta" id="tray-go" onclick="goStep('priorities')">Compare Selected Vehicles</button>
  </div>
</div>

<!-- PRIORITIES -->
<div id="s-priorities" class="screen">
  <div class="prio-hero">
    <div class="prio-eyebrow">Vehicle Comparison</div>
    <div class="prio-title">What are you looking for<br>in a vehicle?</div>
    <div class="prio-vs" id="prio-vs"></div>
  </div>
  <div class="prio-body" id="prio-body"><div class="prio-section-lbl">My Priorities</div></div>
  <div class="gen-btn-wrap">
    <button class="gen-btn" onclick="goStep('comparison')">Generate My Assessment</button>
  </div>
</div>

<!-- COMPARISON -->
<div id="s-comparison" class="screen">
  <div class="comp-header">
    <div class="comp-nav">
      <div><div style="font-size:14px;font-weight:900;color:var(--ep-navy)">Vehicle Comparison</div><div style="font-size:10px;color:var(--ep-muted);font-weight:600">Side &middot; by &middot; Side</div></div>
      <div style="width:48px"></div>
    </div>
    <div class="comp-v-row" id="comp-v-row"></div>
  </div>
  <div class="ai-summary-wrap">
    <button class="ai-toggle-btn" onclick="toggleAI()">
      <div class="ai-toggle-accent"></div>
      <span class="ai-toggle-label">AI Summary</span>
      <div class="ai-toggle-chips" id="ai-chips"></div>
      <span class="ai-chevron open" id="ai-chev">&#9662;</span>
    </button>
    <div class="ai-body open" id="ai-body">
      <div class="comp-sliders-wrap" id="comp-sliders"></div>
      <div class="verdict-wrap" id="verdict-wrap"></div>
    </div>
  </div>
  <div class="spec-scroll">
    <div id="spec-rows"></div>
    <div class="cta-wrap">
      <button class="cta-p" onclick="goStep('chat')"><span class="t">I Want to Ask Questions About These Cars</span></button>
      <button class="cta-s"><span class="t">Schedule a Test Drive</span></button>
      <button class="cta-new" onclick="goStep('browse')"><span class="t">New Comparison</span></button>
    </div>
  </div>
</div>

<!-- CHAT -->
<div id="s-chat" class="screen">
  <div class="chat-hdr">
    <div style="display:flex;align-items:center;justify-content:space-between">
      <button class="ep-back-btn" onclick="goStep('comparison')">&#9664; Back</button>
      <span class="ep-logo-text">AUI Assistant</span>
      <div style="width:52px"></div>
    </div>
    <div class="chat-agent">
      <div class="agent-av">EP</div>
      <div><div class="agent-nm">EchoPark AI</div><div class="agent-st"><div class="st-dot"></div>Online &middot; Powered by AUI</div></div>
    </div>
    <div class="chat-ctx"><span class="ctx-lbl">Comparing</span><span class="ctx-cars" id="ctx-cars">&mdash;</span></div>
  </div>
  <div class="chat-msgs" id="chat-msgs"></div>
  <div class="qr-strip" id="qr-strip"></div>
  <div class="chat-inp-row">
    <textarea class="chat-ta" id="chat-ta" rows="1" placeholder="Ask about these vehicles..." onkeydown="chatKey(event)" oninput="taResize(this)"></textarea>
    <button class="chat-send-btn" id="chat-send-btn" onclick="chatSend()">&#10148;</button>
  </div>
</div>

</div>

<script>
const VLABELS=['Less Important','Somewhat','Neutral','Important','Most Important'];
const PRIOS=[
  {key:'price',label:'Price',icon:''},
  {key:'safety',label:'Safety',icon:''},
  {key:'mpg',label:'Fuel Economy',icon:''},
  {key:'value',label:'Overall Value',icon:''},
  {key:'storage',label:'Storage',icon:''},
];
const ICONS={SUV:'',Sedan:'',Truck:'',Hatchback:'',Coupe:''};

let INV = [];
let sel=[null,null],wts={price:2,safety:2,mpg:2,value:2,storage:2},curF='All',aiOpen=true,chatReady=false;
const $=id=>document.getElementById(id);
const fmt=n=>'$'+n.toLocaleString();
const fmtM=n=>(n/1000).toFixed(0)+'k mi';

// ─── Load vehicles from API ────────────────────────────────────────────────
async function loadVehicles() {
  try {
    const resp = await fetch('/api/vehicles');
    const data = await resp.json();
    INV = data.vehicles;
    buildGrid();
  } catch (e) {
    console.error('Failed to load vehicles:', e);
    $('browse-count').textContent = 'Error loading vehicles';
  }
}

function goStep(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  $('s-'+id).classList.add('active');
  if(id==='priorities') buildPrios();
  if(id==='comparison') buildComp();
  if(id==='chat') initChat();
  window.scrollTo(0,0);
}

function thumb(v,cls,h){
  const phCls = cls.replace('thumb','thumb-ph');
  if(!v.img) return '<div class="'+phCls+'">No Image</div>';
  return '<img src="'+v.img+'" class="'+cls+'" loading="lazy" onerror="this.style.display=\'none\';this.parentNode.insertAdjacentHTML(\'beforeend\',\'<div class=&quot;'+phCls+'&quot;>No Image</div>\')">';
}

function badgeHTML(b){
  if(b==='great_deal') return '<span class="vbadge vb-deal">Great Deal</span>';
  if(b==='good_deal')  return '<span class="vbadge vb-deal">Good Deal</span>';
  if(b==='hot_car')    return '<span class="vbadge vb-hot">Hot Car</span>';
  if(b==='price_drop') return '<span class="vbadge vb-drop">Price Drop</span>';
  return '';
}

function selIdx(v){if(sel[0]&&sel[0].id===v.id)return 0;if(sel[1]&&sel[1].id===v.id)return 1;return -1;}

function buildGrid(){
  const list=INV.filter(v=>curF==='All'||v.body===curF);
  $('browse-count').textContent=list.length+' vehicles';
  const bf=sel[0]&&sel[1];
  $('vgrid').innerHTML=list.map(v=>{
    const si=selIdx(v),isS=si>=0,isFull=bf&&!isS;
    let boxCls='compare-box',lblCls='compare-lbl',lblTxt='Compare',chkMark='';
    if(si===0){boxCls+=' on1';lblCls+=' on';lblTxt='Vehicle 1';chkMark='&#10003;';}
    else if(si===1){boxCls+=' on2';lblCls+=' on';lblTxt='Vehicle 2';chkMark='&#10003;';}
    else if(isFull){boxCls+=' off';}
    const dot=si===0?'<div class="vsel-dot d1">1</div>':si===1?'<div class="vsel-dot d2">2</div>':'';
    return '<div class="vcard '+(si===0?'s1':si===1?'s2':'')+'" onclick="toggleSel('+v.id+')">'+
      '<div class="vcard-img-wrap">'+dot+thumb(v,'vcard-thumb',180)+'</div>'+
      '<div class="vcard-body">'+
        '<div class="vcard-yr-mk">'+v.year+' &middot; '+fmtM(v.miles)+' &middot; '+v.drive+'</div>'+
        '<div class="vcard-model">'+v.make+' '+v.model+'</div>'+
        '<div class="vcard-trim">'+v.trim+'</div>'+
        '<div class="vcard-price">'+fmt(v.price)+'</div>'+
        '<div class="vcard-badges">'+v.badges.map(badgeHTML).join('')+'</div>'+
        '<div class="vcard-actions" onclick="event.stopPropagation()">'+
          '<button class="vcard-schedule">Schedule test drive</button>'+
          '<div class="vcard-heart">&#9825;</div>'+
        '</div>'+
      '</div>'+
      '<div class="vcard-compare"><label class="compare-cb" onclick="event.stopPropagation()"><div class="'+boxCls+'" onclick="toggleSel('+v.id+')">'+chkMark+'</div><span class="'+lblCls+'">'+lblTxt+'</span></label></div>'+
    '</div>';
  }).join('');
}

function toggleSel(id){
  const v=INV.find(x=>x.id===id),si=selIdx(v);
  if(si===0)sel[0]=null;else if(si===1)sel[1]=null;
  else{if(!sel[0])sel[0]=v;else if(!sel[1])sel[1]=v;else return;}
  updateTray();buildGrid();
}

function updateTray(){
  [0,1].forEach(i=>{
    const v=sel[i],slot=$('ts'+i),num=$('tsn'+i),info=$('tsi'+i);
    if(v){slot.classList.add('filled');num.className='slot-num filled-num';num.textContent=i+1;info.innerHTML='<div class="slot-car-name">'+v.year+' '+v.make+' '+v.model+'</div><div class="slot-car-price">'+fmt(v.price)+'</div>';}
    else{slot.classList.remove('filled');num.className='slot-num';num.textContent=i+1;info.innerHTML='<span class="slot-empty-txt">Select Vehicle '+(i+1)+'</span>';}
  });
  $('tray-go').classList.toggle('go',!!(sel[0]&&sel[1]));
}

function setF(f,el){curF=f;document.querySelectorAll('.fchip').forEach(c=>c.classList.remove('on'));el.classList.add('on');buildGrid();}

function buildPrios(){
  const[v1,v2]=sel;if(!v1||!v2)return;
  $('prio-vs').innerHTML='<div class="prio-v">'+thumb(v1,'prio-v-thumb',0)+'<div class="prio-v-price">'+fmt(v1.price)+'</div><div class="prio-v-name">'+v1.year+' '+v1.make+' '+v1.model+'</div><div class="prio-v-sub">'+fmtM(v1.miles)+' &middot; '+v1.drive+'</div></div><div class="prio-vs-orb">VS</div><div class="prio-v" style="text-align:right">'+thumb(v2,'prio-v-thumb',0)+'<div class="prio-v-price">'+fmt(v2.price)+'</div><div class="prio-v-name">'+v2.year+' '+v2.make+' '+v2.model+'</div><div class="prio-v-sub">'+fmtM(v2.miles)+' &middot; '+v2.drive+'</div></div>';
  const body=$('prio-body');body.innerHTML='<div class="prio-section-lbl">My Priorities</div>';
  PRIOS.forEach(p=>{
    const w=wts[p.key],pct=(w/4)*100,fc=w===2?'#C8D5E0':w>2?'#96D600':'#8FA3B1';
    const c=document.createElement('div');c.className='pcard';
    c.innerHTML='<div class="pcard-top"><span class="pcard-icon">'+p.icon+'</span><span class="pcard-name">'+p.label+'</span><span class="pcard-chip '+(w!==2?'lit':'')+'" id="pc-'+p.key+'">'+VLABELS[w]+'</span></div><input type="range" class="epslider" min="0" max="4" step="1" value="'+w+'" style="background:linear-gradient(to right,'+fc+' '+pct+'%,#E0E6ED '+pct+'%)" oninput="updPrio(\''+p.key+'\',+this.value,this)"><div class="pslider-ends"><span class="pslider-end">Less</span><span class="pslider-end">Neutral</span><span class="pslider-end">More</span></div>';
    body.appendChild(c);
  });
}

function updPrio(key,val,el){
  wts[key]=val;const fc=val===2?'#C8D5E0':val>2?'#96D600':'#8FA3B1';
  el.style.background='linear-gradient(to right,'+fc+' '+(val/4*100)+'%,#E0E6ED '+(val/4*100)+'%)';
  const c=$('pc-'+key);if(c){c.textContent=VLABELS[val];c.className='pcard-chip'+(val!==2?' lit':'');}
}

function computeResult(){
  const[v1,v2]=sel;if(!v1||!v2)return null;
  const dims={price:{v1:v1.price<v2.price?88:68,v2:v2.price<v1.price?88:68},safety:{v1:v1.warr?87:60,v2:v2.warr?87:60},mpg:{v1:Math.min(100,Math.round(v1.mpg*2.4)),v2:Math.min(100,Math.round(v2.mpg*2.4))},value:{v1:Math.max(40,Math.round(82-(v1.miles/1000)*0.28)),v2:Math.max(40,Math.round(82-(v2.miles/1000)*0.28))},storage:{v1:Math.min(100,Math.round(v1.cargo*1.05)),v2:Math.min(100,Math.round(v2.cargo*1.05))}};
  let s1=0,s2=0,tot=0;
  PRIOS.forEach(p=>{const w=wts[p.key];s1+=dims[p.key].v1*w;s2+=dims[p.key].v2*w;tot+=w;});
  if(!tot)return{winner:'tie',p1:50,p2:50,dims};
  const p1=Math.round(s1/tot),p2=Math.round(s2/tot);
  return{winner:p1>p2?'v1':p1<p2?'v2':'tie',p1,p2,dims};
}

function buildVerdictLines(v1,v2,res){
  const top=[...PRIOS].sort((a,b)=>wts[b.key]-wts[a.key])[0];
  if(res.winner==='tie')return['Both vehicles score evenly across your priorities.','The '+v1.model+' leads on fuel economy at '+v1.mpg+' MPG.','The '+v2.model+' counters with '+v2.drive+' and '+v2.cargo+' cu.ft. cargo.','Adjust a priority slider above to break the tie.'];
  if(res.winner==='v1')return['The '+v1.year+' '+v1.make+' '+v1.model+' is the stronger match.',fmtM(v1.miles)+' of use and '+(v1.warr?'an active factory warranty':'strong value at this price point')+'.','Leads on '+top.label.toLowerCase()+' \u2014 '+v1.mpg+' MPG'+(v1.drive!=='FWD'?' with '+v1.drive+' capability':'')+'.','The '+v2.model+' offers more cargo ('+v2.cargo+' cu.ft.) and '+v2.drive+'.'];
  return['The '+v2.year+' '+v2.make+' '+v2.model+' is the stronger match.',v2.drive+' and '+v2.cargo+' cu.ft. cargo stand out for your priorities.','At '+fmt(v2.price)+(v1.price>v2.price?' \u2014 saving $'+(v1.price-v2.price).toLocaleString()+' upfront':'')+'.','The '+v1.model+' wins on fuel economy at '+v1.mpg+' MPG'+(v1.warr?' with an active warranty':'')+'.'];
}

function renderVerdict(){
  const[v1,v2]=sel,res=computeResult();if(!res)return;
  const lines=buildVerdictLines(v1,v2,res),tot=res.p1+res.p2,lp=Math.round(res.p1/tot*100);
  const v1w=res.winner==='v1',v2w=res.winner==='v2';
  $('verdict-wrap').innerHTML='<div class="verdict-card"><div class="verdict-bar"><span class="verdict-bar-lbl">'+v1.make+'</span><div class="verdict-track"><div class="vbar-l" style="width:'+lp+'%;background:'+(v1w?'var(--ep-green)':'#C8D5E0')+'"></div><div class="vbar-r" style="background:'+(v2w?'var(--ep-green)':'var(--ep-border)')+'"></div></div><span class="verdict-bar-lbl">'+v2.make+'</span></div><div class="verdict-ttl">Echo Park Recommends...</div><div class="verdict-lines">'+lines.map((l,i)=>'<p '+(i===0?'class="bold"':'')+'>'+l+'</p>').join('')+'</div></div>';
}

function renderCompHeader(){
  const[v1,v2]=sel;
  $('comp-v-row').innerHTML='<div class="comp-vcard">'+thumb(v1,'comp-vcard-thumb',72)+'<div class="comp-vcard-body"><div class="comp-v-name">'+v1.year+' '+v1.make+'</div><div class="comp-v-name">'+v1.model+'</div><div class="comp-v-sub">'+fmtM(v1.miles)+' &middot; '+v1.drive+'</div><div class="comp-v-price">'+fmt(v1.price)+'</div></div></div><div class="comp-vcard">'+thumb(v2,'comp-vcard-thumb',72)+'<div class="comp-vcard-body"><div class="comp-v-name">'+v2.year+' '+v2.make+'</div><div class="comp-v-name">'+v2.model+'</div><div class="comp-v-sub">'+fmtM(v2.miles)+' &middot; '+v2.drive+'</div><div class="comp-v-price">'+fmt(v2.price)+'</div></div></div>';
}

function renderCompSliders(){
  const cont=$('comp-sliders');cont.innerHTML='';
  PRIOS.forEach(p=>{
    const w=wts[p.key],pct=(w/4)*100,fc=w===2?'#C8D5E0':w>2?'#96D600':'#8FA3B1';
    const row=document.createElement('div');row.className='cslider-row';
    row.innerHTML='<div class="cslider-lrow"><span class="cslider-icon">'+p.icon+'</span><span class="cslider-name">'+p.label+'</span><span class="cslider-val '+(w!==2?'lit':'')+'" id="csv-'+p.key+'">'+VLABELS[w]+'</span></div><input type="range" class="epslider" min="0" max="4" step="1" value="'+w+'" style="background:linear-gradient(to right,'+fc+' '+pct+'%,#E0E6ED '+pct+'%)" oninput="updComp(\''+p.key+'\',+this.value,this)">';
    cont.appendChild(row);
  });
}

function updComp(key,val,el){
  wts[key]=val;const fc=val===2?'#C8D5E0':val>2?'#96D600':'#8FA3B1';
  el.style.background='linear-gradient(to right,'+fc+' '+(val/4*100)+'%,#E0E6ED '+(val/4*100)+'%)';
  const c=$('csv-'+key);if(c){c.textContent=VLABELS[val];c.className='cslider-val'+(val!==2?' lit':'');}
  renderVerdict();renderCompHeader();updateAIChips();
}

function updateAIChips(){
  const res=computeResult();if(!res)return;
  const w=res.winner==='v1'?sel[0]:res.winner==='v2'?sel[1]:null;
  $('ai-chips').innerHTML=w?'<span class="ai-chip-mini">'+w.make+' '+w.model+'</span>':'';
}

function toggleAI(){
  aiOpen=!aiOpen;
  $('ai-body').classList.toggle('open',aiOpen);
  $('ai-chev').classList.toggle('open',aiOpen);
  updateAIChips();
}

function renderSpecs(){
  const[v1,v2]=sel;
  function pill(t,c){return '<span class="spill '+c+'">'+t+'</span>';}
  function bar(p,g){return '<div class="mbar"><div class="mbar-fill" style="width:'+p+'%;background:'+(g?'var(--ep-green)':'var(--ep-muted)')+'"></div></div>';}
  function chk(ok){return '<span class="chk '+(ok?'chk-y':'chk-n')+'">'+(ok?'&#10003;':'&#10007;')+'</span>';}
  function row(lbl,lH,rH,lw,rw){return '<div class="srow"><div class="srow-hdr">'+lbl+'</div><div class="srow-cells"><div class="scell '+(lw?'win':'')+'">'+lH+'</div><div class="scell '+(rw?'win':'')+'">'+rH+'</div></div></div>';}
  function sv(t,m){return '<span class="sval '+(m?'muted':'')+'">'+t+'</span>';}
  function div(l){return '<div class="sec-div"><span class="sec-div-lbl">'+l+'</span><div class="sec-div-line"></div></div>';}
  const cp=v1.price<v2.price,cm=v1.miles<v2.miles,cm2=v1.mpg>v2.mpg,chp=v1.hp>v2.hp,cca=v1.cargo>v2.cargo;
  const pd=Math.abs(v1.price-v2.price);
  $('spec-rows').innerHTML=
    div('1 &middot; Essentials &amp; Budget')+
    row('Purchase Price',sv(fmt(v1.price))+(cp?pill('Save $'+pd.toLocaleString(),'sp-green'):''),sv(fmt(v2.price))+(!cp?pill('Save $'+pd.toLocaleString(),'sp-green'):''),cp,!cp)+
    row('Odometer',sv(v1.miles.toLocaleString()+' mi')+(cm?pill('Lower Wear','sp-green'):''),sv(v2.miles.toLocaleString()+' mi')+(!cm?pill('Lower Wear','sp-green'):''),cm,!cm)+
    row('Factory Warranty',sv(v1.warr?'Active':'Expired',!v1.warr)+(v1.warr&&!v2.warr?pill('Covered','sp-green'):''),sv(v2.warr?'Active':'Expired',!v2.warr)+(v2.warr&&!v1.warr?pill('Covered','sp-green'):''),v1.warr,v2.warr)+
    div('2 &middot; Performance &amp; Drivetrain')+
    row('Drivetrain',sv(v1.drive)+(v1.drive!=='FWD'?pill('All-Terrain','sp-green'):pill('Efficient','sp-blue')),sv(v2.drive)+(v2.drive!=='FWD'?pill('All-Terrain','sp-green'):pill('Efficient','sp-blue')),false,false)+
    row('Fuel Economy',sv(v1.mpg+' MPG',!cm2)+bar(Math.min(100,v1.mpg*2.4),cm2),sv(v2.mpg+' MPG',cm2)+bar(Math.min(100,v2.mpg*2.4),!cm2),cm2,!cm2)+
    row('Horsepower',sv(v1.hp+' HP',!chp)+bar(Math.min(100,Math.round(v1.hp/4)),chp),sv(v2.hp+' HP',chp)+bar(Math.min(100,Math.round(v2.hp/4)),!chp),chp,!chp)+
    div('3 &middot; Interior &amp; Cargo')+
    row('Max Cargo Space',sv(v1.cargo+' cu.ft.',!cca)+bar(Math.min(100,Math.round(v1.cargo)),cca),sv(v2.cargo+' cu.ft.',cca)+bar(Math.min(100,Math.round(v2.cargo)),!cca),cca,!cca)+
    row('Exterior Color',sv(v1.color),sv(v2.color),false,false)+
    div('4 &middot; Safety &amp; Technology')+
    row('Factory Warranty','<div style="display:flex;align-items:center;gap:5px">'+chk(v1.warr)+'<span class="sval '+(v1.warr?'':'muted')+'">'+(v1.warr?'Active':'Expired')+'</span></div>','<div style="display:flex;align-items:center;gap:5px">'+chk(v2.warr)+'<span class="sval '+(v2.warr?'':'muted')+'">'+(v2.warr?'Active':'Expired')+'</span></div>',v1.warr,v2.warr)+
    row('Apple CarPlay','<div style="display:flex;align-items:center;gap:5px">'+chk(true)+'<span class="sval">Wireless</span></div>','<div style="display:flex;align-items:center;gap:5px">'+chk(true)+'<span class="sval">Wireless</span></div>',false,false);
}

function buildComp(){
  const[v1,v2]=sel;if(!v1||!v2)return;
  $('ctx-cars').textContent=v1.make+' '+v1.model+' vs '+v2.make+' '+v2.model;
  renderCompHeader();renderCompSliders();renderVerdict();renderSpecs();updateAIChips();
}

// ─── AI Chat (via server proxy) ──────────────────────────────────────────────

const QREPLIES = [
  {l:'&#128176; Which is the better deal?',  m:'Which of these two vehicles is the better overall deal?'},
  {l:'&#9981; Fuel economy breakdown',       m:'Break down the fuel economy difference and what it means for me annually.'},
  {l:'&#128737;&#65039; Warranty & reliability', m:'What is the warranty situation and which is likely more reliable?'},
  {l:'&#128663; Which should I test drive?',  m:'Which one should I prioritize test driving first and why?'},
  {l:'&#128295; Long-term ownership costs',  m:'Which will cost less to own over the next 3 years?'},
  {l:'&#128230; Best for families?',          m:'Which is better suited for a family with kids?'},
];

let chatHistory = [];
let isStreaming = false;

function buildSystemPrompt(v1, v2) {
  const res = computeResult();
  const winner = res.winner === 'v1' ? v1 : res.winner === 'v2' ? v2 : null;
  return 'You are the EchoPark AI Assistant \u2014 a friendly, knowledgeable, and honest car-buying advisor for EchoPark Automotive, one of America\'s most trusted used car retailers. You speak in a warm, conversational tone: confident but never pushy, always focused on helping the customer find the right vehicle for their needs.\n\n## The customer is currently comparing these two specific vehicles:\n\n### Vehicle 1: '+v1.year+' '+v1.make+' '+v1.model+' '+v1.trim+'\n- Price: $'+v1.price.toLocaleString()+'\n- Mileage: '+v1.miles.toLocaleString()+' miles\n- Drivetrain: '+v1.drive+'\n- Body Style: '+v1.body+'\n- Exterior Color: '+v1.color+'\n- Fuel Economy: '+v1.mpg+' MPG\n- Horsepower: '+v1.hp+' HP\n- Max Cargo Space: '+v1.cargo+' cu.ft.\n- Factory Warranty: '+(v1.warr?'ACTIVE':'Expired')+'\n- EchoPark Badges: '+v1.badges.join(', ')+'\n\n### Vehicle 2: '+v2.year+' '+v2.make+' '+v2.model+' '+v2.trim+'\n- Price: $'+v2.price.toLocaleString()+'\n- Mileage: '+v2.miles.toLocaleString()+' miles\n- Drivetrain: '+v2.drive+'\n- Body Style: '+v2.body+'\n- Exterior Color: '+v2.color+'\n- Fuel Economy: '+v2.mpg+' MPG\n- Horsepower: '+v2.hp+' HP\n- Max Cargo Space: '+v2.cargo+' cu.ft.\n- Factory Warranty: '+(v2.warr?'ACTIVE':'Expired')+'\n- EchoPark Badges: '+v2.badges.join(', ')+'\n\n## Customer\'s priority weights (scale 0\u20134, where 2 = neutral, 4 = most important):\n- Price sensitivity: '+wts.price+'/4\n- Safety importance: '+wts.safety+'/4\n- Fuel economy importance: '+wts.mpg+'/4\n- Overall value importance: '+wts.value+'/4\n- Storage/cargo importance: '+wts.storage+'/4\n\n## AI Assessment:\n'+(winner?'Based on the customer\'s priorities, the '+winner.year+' '+winner.make+' '+winner.model+' is currently scoring as the stronger match.':'Both vehicles are currently scoring evenly based on the customer\'s priorities.')+'\n\n## Your guidelines:\n- Always refer to vehicles by their year, make, and model (e.g. "the 2023 Trailblazer")\n- Be specific \u2014 use the actual numbers above (price, MPG, mileage, etc.) in your answers\n- When relevant, mention EchoPark\'s 7-day Happiness Guarantee and 190-point inspection\n- If asked about scheduling a test drive, encourage them to visit their nearest EchoPark location\n- For financing questions, mention EchoPark works with top lenders including Ally and Wells Fargo\n- If asked about protection plans, EchoPark offers vehicle service contracts up to 5 years/60,000 miles\n- Keep responses concise and scannable \u2014 2\u20134 short paragraphs max\n- Never make up specs not listed above; if you don\'t know something, say so honestly\n- Do not recommend the customer go elsewhere or compare with other dealerships\n- End responses with a natural follow-up question to keep the conversation going';
}

function initChat() {
  if (chatReady) return;
  chatReady = true;
  chatHistory = [];
  const [v1, v2] = sel;
  $('chat-msgs').innerHTML = '';
  $('qr-strip').innerHTML = QREPLIES.map(q =>
    '<button class="qrbtn" onclick="sendMsg(this.dataset.msg)" data-msg="'+q.m.replace(/"/g,'&quot;')+'">'+q.l+'</button>'
  ).join('');

  const greeting = 'Hi! I\'m your EchoPark AI assistant. I can see you\'re comparing the '+v1.year+' '+v1.make+' '+v1.model+' at $'+v1.price.toLocaleString()+' against the '+v2.year+' '+v2.make+' '+v2.model+' at $'+v2.price.toLocaleString()+'. I know the full specs on both \u2014 what would you like to know?';
  addMsg('agent', greeting);
  chatHistory.push({ role: 'assistant', content: greeting });
}

function addMsg(role, html) {
  const msgs = $('chat-msgs');
  const now = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  const el = document.createElement('div');
  el.className = 'cmsg ' + role;
  el.innerHTML = '<div class="cmsg-bubble">'+html+'</div><div class="cmsg-time">'+now+'</div>';
  msgs.appendChild(el);
  msgs.scrollTop = msgs.scrollHeight;
  return el;
}

function addStreamingBubble() {
  const msgs = $('chat-msgs');
  const now = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  const el = document.createElement('div');
  el.className = 'cmsg agent';
  el.innerHTML = '<div class="cmsg-bubble" id="stream-bubble"><div class="typing-wrap"><div class="tdot"></div><div class="tdot"></div><div class="tdot"></div></div></div><div class="cmsg-time">'+now+'</div>';
  msgs.appendChild(el);
  msgs.scrollTop = msgs.scrollHeight;
  return el;
}

function setSendState(busy) {
  isStreaming = busy;
  const btn = $('chat-send-btn');
  const ta = $('chat-ta');
  btn.disabled = busy;
  ta.disabled = busy;
  btn.style.opacity = busy ? '0.5' : '1';
}

async function sendMsg(text) {
  if (isStreaming || !text.trim()) return;

  addMsg('user', text);
  chatHistory.push({ role: 'user', content: text });
  setSendState(true);

  const [v1, v2] = sel;
  const streamEl = addStreamingBubble();
  const bubble = $('stream-bubble');

  try {
    const resp = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        system: buildSystemPrompt(v1, v2),
        messages: chatHistory.filter(m => m.role !== 'assistant' || chatHistory.indexOf(m) < chatHistory.length - 1 ? true : false),
      }),
    });

    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      bubble.innerHTML = '&#9888;&#65039; ' + (err.message || 'Error connecting to AI. Please try again.');
      setSendState(false);
      return;
    }

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let fullText = '';
    bubble.innerHTML = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      const chunk = decoder.decode(value, { stream: true });
      const lines = chunk.split('\n').filter(l => l.startsWith('data: '));
      for (const line of lines) {
        const data = line.slice(6).trim();
        if (data === '[DONE]') continue;
        try {
          const parsed = JSON.parse(data);
          const delta = parsed.delta?.text || '';
          if (delta) {
            fullText += delta;
            bubble.innerHTML = fullText.replace(/\n/g, '<br>');
            $('chat-msgs').scrollTop = $('chat-msgs').scrollHeight;
          }
        } catch {}
      }
    }

    chatHistory.push({ role: 'assistant', content: fullText });
  } catch (e) {
    bubble.innerHTML = '&#9888;&#65039; Network error: ' + e.message;
  }

  setSendState(false);
}

async function chatSend() {
  const ta = $('chat-ta');
  const txt = ta.value.trim();
  if (!txt) return;
  ta.value = '';
  ta.style.height = 'auto';
  await sendMsg(txt);
}

function chatKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); chatSend(); }
}
function taResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 80) + 'px'; }

// Boot
loadVehicles();
</script>
